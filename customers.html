{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h4 style="padding-top: 1.3rem;">Customer List</h4>
    <a href="{{ url_for('add_customer') }}" class="btn btn-success btn-lg" style="margin-top: 1rem;">+ Add Customer</a>
</div>

<form class="mb-3" method="get">
    <div class="input-group input-group-lg">
        <input type="text" name="q" class="form-control" placeholder="Search by name or code..." value="{{ q or '' }}">
        <button class="btn btn-primary" type="submit">Search</button>
    </div>
</form>

<div class="card shadow">
    <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in customers %}
                <tr>
                    <td><strong>{{ c.code }}</strong></td>
                    <td>{{ c.name }}</td>
                    <td>{{ c.phone or '-' }}</td>
                    <td>{{ c.address or '-' }}</td>
                    <td class="text-nowrap">
                        <a href="{{ url_for('customer_ledger', id=c.id) }}" class="btn btn-sm btn-info text-white">Bill</a>
                        <a href="{{ url_for('edit_customer', cid=c.id) }}" class="btn btn-sm btn-warning">Edit</a>
                        <form method="post" action="{{ url_for('delete_customer', cid=c.id) }}" class="d-inline"
                              onsubmit="return confirm('Delete this customer?');">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" class="text-center py-4">No customers found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
